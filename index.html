<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sonoria | 听见灵魂</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎐</text></svg>">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Hydra 可视化引擎 -->
    <script src="hydra-synth.min.js"></script>
    <!-- Strudel 实时音乐引擎 -->
    <script src="strudel.js"></script>

    <style>
        :root {
            --primary: #8E2DE2;
            --accent: #00d2ff;
            --bg-deep: #000000;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.06);
            --highlight: rgba(255, 255, 255, 0.12);
            --text-main: rgba(255, 255, 255, 0.95);
            --text-sub: rgba(255, 255, 255, 0.55);
            --ease-elastic: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.23, 1, 0.32, 1);
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-deep); color: var(--text-main); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; width: 100vw; user-select: none; position: fixed; }
        #visualizer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; filter: contrast(1.2) brightness(1.1); transition: opacity 1s ease; }
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.6) 100%); z-index: 2; pointer-events: none; }

        .app-shell { position: relative; z-index: 10; height: 100vh; width: 100vw; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: var(--safe-top) 20px var(--safe-bottom); transition: all 0.8s var(--ease-smooth); perspective: 1000px; }
        .lens-card { width: 100%; max-width: 380px; background: var(--glass); backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%); border: 1px solid var(--border); border-top: 1px solid var(--highlight); border-radius: 40px; padding: 32px 28px; display: flex; flex-direction: column; gap: 24px; box-shadow: 0 30px 80px -20px rgba(0,0,0,0.5); transform-style: preserve-3d; transition: all 0.8s var(--ease-smooth); will-change: transform, opacity; }
        .header { display: flex; justify-content: space-between; align-items: center; opacity: 0.9; }
        .brand { font-size: 0.75rem; letter-spacing: 3px; font-weight: 700; color: var(--text-sub); display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .icon-btn { background: transparent; border: none; color: var(--text-main); width: 44px; height: 44px; border-radius: 50%; display: grid; place-items: center; transition: 0.3s; cursor: pointer; }
        .icon-btn:active { background: rgba(255,255,255,0.1); transform: scale(0.95); }
        .hero-text { text-align: center; margin-top: 10px; }
        .title { font-family: 'Inter', sans-serif; font-size: 1.5rem; font-weight: 700; line-height: 1.3; color: var(--text-main); margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; letter-spacing: -0.5px; }
        .artist { font-size: 0.9rem; color: var(--text-sub); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .artist::before { content: ''; width: 4px; height: 4px; background: var(--text-sub); border-radius: 50%; opacity: 0.5; }
        .progress-container { padding: 16px 0; cursor: pointer; }
        .progress-rail { height: 3px; background: rgba(255,255,255,0.1); width: 100%; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--text-main); width: 0%; border-radius: 2px; transition: width 0.1s linear; }
        .time-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-sub); margin-top: 8px; font-variant-numeric: tabular-nums; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 36px; padding: 10px 0; }
        .play-btn { width: 72px; height: 72px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; font-size: 32px; display: grid; place-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); cursor: pointer; transition: 0.3s var(--ease-elastic); backdrop-filter: blur(10px); }
        .play-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.2); }
        .sub-btn { font-size: 30px; color: var(--text-sub); background: none; border: none; cursor: pointer; transition: 0.3s; }
        .sub-btn:active { color: #fff; transform: scale(0.9); }
        .toolbar { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 24px; margin-top: 8px; }
        .pill { height: 40px; padding: 0 18px; border-radius: 100px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.05); color: #fff; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.3s; }
        .pill:active { background: rgba(255,255,255,0.15); transform: scale(0.98); }
        #mic-btn.active { color: #00d2ff; text-shadow: 0 0 15px rgba(0, 210, 255, 0.6); }
        .drawer { height: 0; overflow: hidden; transition: 0.5s var(--ease-smooth); opacity: 0; background: rgba(0,0,0,0.2); border-radius: 20px; }
        .drawer.open { height: auto; opacity: 1; margin-top: 16px; padding: 16px; border: 1px solid var(--border); }

        .glass-input {
            width: 100%; background: rgba(255,255,255,0.08); border: 1px solid transparent;
            padding: 14px; border-radius: 12px; color: #fff; margin-bottom: 10px;
            outline: none; font-size: 0.9rem; transition: 0.3s;
            font-family: 'Inter', monospace;
            resize: vertical;
        }
        .glass-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.12); }

        .full-btn { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 12px; color: #fff; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .full-btn:active { transform: scale(0.98); opacity: 0.85; }
        .full-btn.secondary { background: var(--border); margin-top: 8px; }
        .playlist-view { max-height: 200px; overflow-y: auto; }
        .pl-item { padding: 12px; border-radius: 10px; font-size: 0.9rem; color: var(--text-sub); cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.03); transition: 0.2s; }
        .pl-item:active { background: rgba(255,255,255,0.05); }
        .pl-item.active { background: rgba(255,255,255,0.08); color: #fff; }
        .phantom-capsule { position: fixed; bottom: calc(30px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(150px); background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; padding: 6px 8px 6px 10px; display: flex; align-items: center; gap: 14px; z-index: 999; opacity: 0; pointer-events: none; transition: all 0.8s var(--ease-elastic); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .app-shell.zen .lens-card { opacity: 0; transform: scale(0.92) translateY(-40px); filter: blur(30px); pointer-events: none; }
        .app-shell.zen ~ .phantom-capsule { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }
        .capsule-core { width: 42px; height: 42px; position: relative; display: grid; place-items: center; border-radius: 50%; flex-shrink: 0; transition: transform 0.05s linear, box-shadow 0.1s linear; }
        .ring-svg { position: absolute; transform: rotate(-90deg); width: 100%; height: 100%; overflow: visible; }
        .ring-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 3; }
        .ring-progress { fill: none; stroke: #fff; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 100; stroke-dashoffset: 100; transition: stroke-dashoffset 0.1s linear, stroke 0.5s; }
        .ring-logo { font-size: 20px; z-index: 1; color: #fff; transition: color 0.5s; }
        .capsule-info { width: 120px; font-size: 0.9rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: left; }
        .capsule-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.1); color: #fff; border: none; display: grid; place-items: center; cursor: pointer; flex-shrink: 0; transition: 0.2s; }
        .capsule-btn:active { background: rgba(255,255,255,0.2); }
        .toast { position: fixed; top: calc(20px + var(--safe-top)); left: 50%; transform: translateX(-50%) translateY(-20px); background: rgba(20,20,20,0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 30px; font-size: 0.85rem; color: #fff; opacity: 0; transition: 0.4s var(--ease-elastic); z-index: 1000; pointer-events: none; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        input[type="file"] { display: none; }

        .style-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
        }
        .style-card {
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .style-card:hover { background: rgba(255,255,255,0.1); }
        .style-card.active { border-color: var(--accent); background: rgba(0,210,255,0.1); }
        .style-name { font-size: 0.85rem; font-weight: 500; margin-bottom: 2px; }
        .style-desc { font-size: 0.7rem; color: var(--text-sub); }
        .style-category { font-size: 0.65rem; color: var(--accent); margin-top: 4px; }

        /* Breathing animation for playing state */
        .lens-card.breathing {
            animation: breathe 4s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { box-shadow: 0 30px 80px -20px rgba(0,0,0,0.5); }
            50% { box-shadow: 0 30px 80px -20px rgba(142,45,226,0.3); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    </style>
</head>
<body>
    <canvas id="visualizer"></canvas>
    <div class="vignette"></div>
    <div class="app-shell" id="app-shell">
        <div class="lens-card" id="card">
            <div class="header">
                <button class="icon-btn" onclick="enterZenMode()" title="最小化/沉浸">
                    <i class="material-icons-round">keyboard_arrow_down</i>
                </button>
                <div class="brand">SONORIA</div>
                <button class="icon-btn" onclick="toggleDrawer('playlist-drawer')" title="列表">
                    <i class="material-icons-round">queue_music</i>
                </button>
            </div>
            <div class="hero-text">
                <div class="title" id="track-title">Soul Frequency</div>
                <div class="artist" id="track-artist">Touch to start</div>
            </div>
            <div class="drawer" id="input-drawer">
                <input type="text" class="glass-input" id="url-input" placeholder="粘贴音频链接 (mp3/wav) 并回车...">
                <div class="action-row">
                    <button class="full-btn" onclick="document.getElementById('file-input').click()">
                        <i class="material-icons-round" style="vertical-align:middle; font-size:18px;">folder_open</i> 本地文件
                    </button>
                </div>
            </div>
            <div class="drawer" id="playlist-drawer">
                <div class="playlist-view" id="playlist-view">
                    <div style="text-align:center; color:var(--text-sub); padding:10px;">列表为空</div>
                </div>
            </div>
            <div class="drawer" id="hydra-drawer">
                <textarea class="glass-input" id="hydra-code" rows="6" placeholder="输入Hydra代码，点击运行...">
s.osc(30, 0.1, a.low).rotate(time * 0.1).out()
                </textarea>
                <button class="full-btn" onclick="runHydra()">运行视觉效果</button>
                <button class="full-btn secondary" onclick="resetHydra()">重置为主题预设</button>
            </div>
            <div class="drawer" id="strudel-drawer">
                <textarea class="glass-input" id="strudel-code" rows="8" placeholder="输入Strudel代码，点击运行...">
// 柔和弦乐Disco
bpm(122)
stack(
  s("bd ~ ~ ~ bd ~ ~ ~").gain(0.8),
  s("~ ~ sd ~ ~ ~ sd ~").gain(0.6),
  s("hh*8 oh/4").gain(0.4),
  s("~ cowbell ~ cowbell").gain(0.25),
  n("c2 ~ e2 ~ g2 ~ a2 ~").s("fm").dur(0.5).lpf(600).gain(0.55),
  n("c4 e4 g4 a4 g4 e4 c4 ~").s("square").stutter(2).dur(0.5).lpf(1600).delay(0.25).delaytime(1/8).gain(0.28),
  n("c3 e3 g3, f3 a3 c4, g3 b3 d4, c3 e3 g3").s("strings").dur(2).lpf(2200).reverb(0.75).gain(0.22),
  n("c4 e4 g4 c5, f4 a4 c5 f5, g4 b4 d5 g5, c4 e4 g4 c5").s("harp").dur(0.25).slow(2).reverb(0.8).delay(0.2).delaytime(1/4).gain(0.15)
)
                </textarea>
                <button class="full-btn" onclick="runStrudel()">运行音乐代码</button>
                <button class="full-btn secondary" onclick="stopStrudel()">停止生成</button>
            </div>
            <div class="drawer" id="styles-drawer">
                <div style="margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-weight: 500;">可视化风格</span>
                    <button class="icon-btn" style="width: 32px; height: 32px; font-size: 18px;" onclick="randomSmartTheme()" title="智能推荐">
                        <i class="material-icons-round">smart_toy</i>
                    </button>
                </div>
                <div class="style-grid" id="style-grid"></div>
            </div>
            <div class="progress-container" id="progress-container">
                <div class="progress-rail"><div class="progress-fill" id="progress-fill"></div></div>
                <div class="time-meta"><span id="curr-time">0:00</span><span id="total-time">0:00</span></div>
            </div>
            <div class="controls">
                <button class="sub-btn" onclick="engine.playPrev()"><i class="material-icons-round">skip_previous</i></button>
                <button class="play-btn" id="main-play"><i class="material-icons-round">play_arrow</i></button>
                <button class="sub-btn" onclick="engine.playNext()"><i class="material-icons-round">skip_next</i></button>
            </div>
            <div class="toolbar">
                <button class="pill" onclick="toggleDrawer('input-drawer')"><i class="material-icons-round">add</i> 添加</button>
                <button class="icon-btn" id="magic-btn" onclick="randomSmartTheme()" title="智能切换主题"><i class="material-icons-round">auto_awesome</i></button>
                <button class="icon-btn" id="styles-btn" onclick="toggleDrawer('styles-drawer')" title="风格选择"><i class="material-icons-round">palette</i></button>
                <button class="icon-btn" id="strudel-btn" onclick="toggleDrawer('strudel-drawer')" title="音乐代码"><i class="material-icons-round">code</i></button>
                <button class="icon-btn" id="mic-btn" title="空气共鸣"><i class="material-icons-round">blur_on</i></button>
            </div>
        </div>
    </div>
    <div class="phantom-capsule" id="capsule">
        <div class="capsule-core" id="capsule-core">
            <svg class="ring-svg" viewBox="0 0 36 36">
                <path class="ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                <path class="ring-progress" id="ring-progress" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
            </svg>
            <i class="material-icons-round ring-logo" id="ring-logo">graphic_eq</i>
        </div>
        <div class="capsule-info" id="capsule-text">Soul Frequency</div>
        <button class="capsule-btn" id="capsule-play"><i class="material-icons-round">play_arrow</i></button>
    </div>
    <div class="toast" id="toast"><span id="toast-msg">Ready</span></div>
    <input type="file" id="file-input" accept="audio/wav,audio/mp3,audio/m4a,audio/*" multiple>

    <script>
    // === SONORIA V5.5 — Fixed & Optimized ===

    // ─── State ───
    var state = {
        playing: false, mic: false, mode: 'aurora', zenTimer: null,
        ctx: null, analyser: null, src: null, audioEl: null,
        playlist: [], trackIdx: 0, touchStartX: 0,
        strudelPlaying: false,
        devicePerformance: 2,
        micStream: null
    };

    // ─── 20+ Visualization Styles ───
    var visualStyles = [
        {
            id: "aurora", name: "极光", category: "自然",
            description: "流动的彩色光带",
            energyRange: [0, 1], bpmRange: [60, 180], performanceLevel: 2,
            render: function(hue, low, mid, high, energy) {
                s.osc(10, 0.1, function() { return low * 2; })
                  .rotate(function() { return time * 0.2; })
                  .modulate(s.noise(3, 0.5), function() { return energy * 0.5; })
                  .color(function() { return hue % 360 / 360; }, 0.8, 0.6)
                  .blend(s.osc(20, 0.05).color(0.6, 0.8, 1), 0.3)
                  .out();
            }
        },
        {
            id: "cosmic", name: "宇宙", category: "宇宙",
            description: "闪烁的星空粒子",
            energyRange: [0, 0.7], bpmRange: [60, 140], performanceLevel: 1,
            render: function(hue, low, mid, high, energy) {
                s.noise(100, 0.1)
                  .thresh(function() { return 0.5 + low * 0.5; })
                  .scale(1, 1, 2)
                  .color(0.7, 0.3, 1)
                  .add(s.noise(80, 0.2).thresh(0.7).color(0.3, 0.7, 1), 0.5)
                  .out();
            }
        },
        {
            id: "neural", name: "神经", category: "几何",
            description: "动态神经网络",
            energyRange: [0.3, 1], bpmRange: [90, 160], performanceLevel: 3,
            render: function(hue, low, mid, high, energy) {
                s.shape(4, 0.02, 0)
                  .repeat(20, 20)
                  .modulate(s.noise(2, 0.3), function() { return mid * 0.3; })
                  .color(1, 0.2, 0.4)
                  .blend(s.shape(3, 0.01).repeat(15, 15).color(0.8, 0.1, 0.3), 0.4)
                  .out();
            }
        },
        {
            id: "liquid", name: "液体", category: "流体",
            description: "液态金属波纹",
            energyRange: [0.2, 0.9], bpmRange: [80, 160], performanceLevel: 2,
            render: function(hue, low, mid, high, energy) {
                s.gradient()
                  .modulate(s.osc(5, 0.1, function() { return high * 3; }), 0.2)
                  .color(0.5, 0.8, 1)
                  .contrast(1.5)
                  .brightness(function() { return energy * 0.3; })
                  .out();
            }
        },
        {
            id: "spectrum", name: "频谱", category: "频谱",
            description: "响应式频谱柱",
            energyRange: [0, 1], bpmRange: [60, 200], performanceLevel: 1,
            render: function(hue, low, mid, high, energy) {
                s.noise(64, 0.05)
                  .thresh(function() { return 0.3 + energy * 0.4; })
                  .color(function() { return hue % 360 / 360; }, 0.8, 0.6)
                  .add(s.noise(32, 0.1).thresh(0.6).color(0.3, 0.7, 1), 0.3)
                  .out();
            }
        },
        {
            id: "nebula", name: "星云", category: "宇宙",
            description: "流动的星云气体",
            energyRange: [0, 0.5], bpmRange: [60, 120], performanceLevel: 2,
            render: function(hue, low, mid, high, energy) {
                s.noise(2, 0.3)
                  .modulate(s.osc(1, 0.1, function() { return low * 2; }), 0.5)
                  .color(function() { return hue % 360 / 360; }, 0.7, 0.6)
                  .blend(s.noise(3, 0.2).color(function() { return (hue % 360 / 360 + 0.2) % 1; }, 0.6, 0.7), 0.4)
                  .out();
            }
        },
        {
            id: "fractal", name: "分形", category: "数学",
            description: "无限递归的分形图案",
            energyRange: [0.1, 0.8], bpmRange: [70, 150], performanceLevel: 3,
            render: function(hue, low, mid, high, energy) {
                s.osc(3, 0.1, function() { return mid; })
                  .kaleid(4)
                  .modulate(s.noise(2, 0.3), function() { return energy * 0.3; })
                  .color(function() { return hue % 360 / 360; }, 0.8, 0.5)
                  .out();
            }
        },
        {
            id: "waveform", name: "波形", category: "频谱",
            description: "实时音频波形",
            energyRange: [0, 1], bpmRange: [60, 200], performanceLevel: 1,
            render: function(hue, low, mid, high, energy) {
                s.noise(128, 0.02)
                  .thresh(function() { return 0.45 + energy * 0.3; })
                  .color(1, 1, 1)
                  .mult(s.osc(1, 0.1, function() { return low; }))
                  .out();
            }
        },
        {
            id: "fire", name: "火焰", category: "自然",
            description: "跳动的火焰效果",
            energyRange: [0.4, 1], bpmRange: [100, 180], performanceLevel: 2,
            render: function(hue, low, mid, high, energy) {
                s.noise(5, 0.4)
                  .thresh(0.3)
                  .color(0.05, 0.8, 0.6)
                  .add(s.noise(4, 0.3).thresh(0.5).color(0.1, 1, 0.8), 0.5)
                  .scrollY(function() { return -0.1 - energy * 0.1; })
                  .out();

    // ─── Hydra Visualizer ───
    var viz = null; // initialized after DOM refs

    function HydraVisualizer(canvas) {
        this.canvas = canvas;
        this.hydra = null;
        this.currentStyle = null;
        this.energy = 0; this.low = 0; this.mid = 0; this.high = 0;
        this.hue = 0;
        this.transitioning = false;
        this.audioLoopId = null;
        this.audioBuffer = new Uint8Array(128);
        this._init();
        this.renderStyleGrid();
    }

    HydraVisualizer.prototype._init = function() {
        try {
            this.hydra = new Hydra({
                canvas: this.canvas,
                detectAudio: false,
                enableStreamCapture: false,
                precision: state.devicePerformance >= 2 ? 'medium' : 'low',
                width: window.innerWidth,
                height: window.innerHeight
            });
            window.hydra = this.hydra;
            window.s = this.hydra.synth;
            window.a = this.hydra.audio;
        } catch (e) {
            console.error('Hydra init failed:', e);
            showToast('Hydra初始化失败: ' + e.message);
        }
    };

    HydraVisualizer.prototype.resize = function() {
        if (this.hydra) this.hydra.resize(window.innerWidth, window.innerHeight);
    };

    HydraVisualizer.prototype.start = function() {
        if (!this.hydra || this.hydra.isRunning) return;
        this.hydra.render();
        this.updateAudioLoop();
        this.applyStyle(state.mode);
    };

    HydraVisualizer.prototype.stop = function() {
        if (!this.hydra || !this.hydra.isRunning) return;
        this.hydra.clear();
        if (this.audioLoopId) {
            cancelAnimationFrame(this.audioLoopId);
            this.audioLoopId = null;
        }
    };

    HydraVisualizer.prototype.updateAudioLoop = function() {
        var self = this;
        if (!state.playing && !state.mic) return;
        this.audioLoopId = requestAnimationFrame(function() { self.updateAudioLoop(); });
        if (!state.analyser) return;

        state.analyser.getByteFrequencyData(this.audioBuffer);
        this.energy = this.audioBuffer.slice(0, 30).reduce(function(a, b) { return a + b; }, 0) / 30 / 255;
        this.low = this.audioBuffer.slice(0, 10).reduce(function(a, b) { return a + b; }, 0) / 10 / 255;
        this.mid = this.audioBuffer.slice(10, 40).reduce(function(a, b) { return a + b; }, 0) / 30 / 255;
        this.high = this.audioBuffer.slice(40, 128).reduce(function(a, b) { return a + b; }, 0) / 88 / 255;

        if (typeof a !== 'undefined') {
            a.low = this.low;
            a.mid = this.mid;
            a.high = this.high;
            a.energy = this.energy;
        }

        var scale = 1 + this.energy * 0.35;
        var themeColor = this.getCurrentThemeColor();
        ui.capsuleCore.style.transform = 'scale(' + scale + ')';
        ui.ringLogo.style.color = themeColor;
        ui.ringProgress.style.stroke = themeColor;
        ui.capsuleCore.style.boxShadow = '0 0 ' + (15 + this.energy * 40) + 'px ' + themeColor + '66';
        this.hue += 0.2 + this.energy;
    };

    HydraVisualizer.prototype.getCurrentThemeColor = function() {
        if (state.mode === 'aurora' || state.mode === 'aurora2') return 'hsl(' + this.hue + ', 80%, 60%)';
        var t = themes.find(function(x) { return x.id === state.mode; });
        return t ? t.color : '#fff';
    };

    HydraVisualizer.prototype.applyStyle = function(styleId) {
        if (this.transitioning) return;
        var self = this;
        var style = visualStyles.find(function(st) { return st.id === styleId; });
        if (!style) return;

        if (style.performanceLevel > state.devicePerformance) {
            var fallback = visualStyles.find(function(st) { return st.performanceLevel <= state.devicePerformance; }) || visualStyles[0];
            showToast('设备性能不足，已切换到 ' + fallback.name);
            return this.applyStyle(fallback.id);
        }

        this.transitioning = true;
        this.currentStyle = style;
        state.mode = styleId;

        this.canvas.style.opacity = '0';
        setTimeout(function() {
            try {
                if (self.hydra) {
                    self.hydra.synth.reset();
                    style.render(self.hue, self.low, self.mid, self.high, self.energy);
                }
            } catch (e) {
                console.error('Style render error:', e);
                showToast('风格渲染出错: ' + e.message);
            }
            self.canvas.style.opacity = '1';
            self.transitioning = false;
            self.updateStyleGrid();
            showToast('风格: ' + style.name);
        }, 300);
    };

    HydraVisualizer.prototype.getSmartStyle = function() {
        var self = this;
        var candidates = visualStyles.filter(function(s) {
            var energyMatch = self.energy >= s.energyRange[0] && self.energy <= s.energyRange[1];
            var perfMatch = s.performanceLevel <= state.devicePerformance;
            var notCurrent = s.id !== state.mode;
            return energyMatch && perfMatch && notCurrent;
        });
        if (candidates.length === 0) {
            return visualStyles.find(function(s) { return s.performanceLevel <= state.devicePerformance && s.id !== state.mode; }) || visualStyles[0];
        }
        return candidates[Math.floor(Math.random() * candidates.length)];
    };

    HydraVisualizer.prototype.renderStyleGrid = function() {
        ui.styleGrid.innerHTML = visualStyles.map(function(s) {
            return '<div class="style-card ' + (s.id === state.mode ? 'active' : '') + '" ' +
                'data-style-id="' + s.id + '" ' +
                'onclick="viz.applyStyle(\'' + s.id + '\'); toggleDrawer(\'styles-drawer\');">' +
                '<div class="style-name">' + s.name + '</div>' +
                '<div class="style-desc">' + s.description + '</div>' +
                '<div class="style-category">' + s.category + '</div>' +
                '</div>';
        }).join('');
    };

    HydraVisualizer.prototype.updateStyleGrid = function() {
        document.querySelectorAll('.style-card').forEach(function(card) {
            card.classList.toggle('active', card.dataset.styleId === state.mode);
        });
    };

    // ─── Audio Engine ───
    var engine = null;

    function AudioEngine() {
        viz = new HydraVisualizer(ui.canvas);
        this.viz = viz;
        this._initStrudel();
        this._detectDevicePerformance();
    }

    AudioEngine.prototype._detectDevicePerformance = function() {
        var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        var lowMemory = navigator.deviceMemory && navigator.deviceMemory < 4;
        if (isMobile || lowMemory) state.devicePerformance = 1;
        else if (navigator.deviceMemory && navigator.deviceMemory >= 8) state.devicePerformance = 3;
        else state.devicePerformance = 2;
        console.log('设备性能等级: ' + state.devicePerformance);
    };

    AudioEngine.prototype._initStrudel = function() {
        try {
            if (typeof initStrudel === 'function') {
                initStrudel({
                    prebake: function() { return samples('github:tidalcycles/dirt-samples'); }
                });
                showToast('Strudel引擎已就绪');
            } else {
                console.warn('initStrudel not found');
            }
        } catch (e) {
            console.error('Strudel初始化失败', e);
            showToast('Strudel加载失败，部分功能不可用');
        }
    };

    AudioEngine.prototype.initContext = function() {
        if (!state.ctx) {
            state.ctx = new (window.AudioContext || window.webkitAudioContext)();
            state.analyser = state.ctx.createAnalyser();
            state.analyser.fftSize = 2048;
            state.analyser.smoothingTimeConstant = 0.8;
            state.analyser.connect(state.ctx.destination);
        }
        if (state.ctx.state === 'suspended') state.ctx.resume();
    };

    AudioEngine.prototype.playUrl = function(url) {
        if (!url) return;
        var self = this;
        this.stop(false);
        this.initContext();
        showToast('正在请求音频流...');

        var fileName = url.split('/').pop().split('?')[0] || 'Network Stream';
        state.playlist.push({ name: fileName, src: url, isUrl: true });
        state.trackIdx = state.playlist.length - 1;
        this.renderPlaylist();

        state.audioEl = new Audio();
        state.audioEl.crossOrigin = 'anonymous';
        state.audioEl.src = url;
        this._setupAudioListeners(state.audioEl, fileName);

        state.audioEl.play()
            .then(function() {
                self.startUI();
                try {
                    state.src = state.ctx.createMediaElementSource(state.audioEl);
                    state.src.connect(state.analyser);
                } catch (e) {
                    console.warn('CORS limitation', e);
                    showToast('受源站限制，仅播放音频');
                }
            })
            .catch(function(e) {
                console.error(e);
                showToast('无法加载链接 (CORS/404)');
                state.playlist.pop();
                self.renderPlaylist();
                self.stopUI();
            });

        document.getElementById('input-drawer').classList.remove('open');
        document.getElementById('url-input').value = '';
    };

    AudioEngine.prototype._setupAudioListeners = function(el, title) {
        var self = this;
        el.onended = function() { self.playNext(); };
        this._bindEvents(el);
        this.updateMeta(title, 'Network Audio');
        el.onerror = function() {
            showToast('链接无效或拒绝访问');
            self.stopUI();
        };
    };

    AudioEngine.prototype.handleFiles = function(files) {
        var self = this;
        var newTracks = Array.from(files).map(function(f) {
            return { name: f.name.replace(/\.[^/.]+$/, ''), src: URL.createObjectURL(f) };
        });
        if (state.playlist.length === 0) {
            state.playlist = newTracks;
            this.playTrack(0);
        } else {
            state.playlist.push.apply(state.playlist, newTracks);
            showToast('已添加 ' + newTracks.length + ' 首歌曲');
        }
        this.renderPlaylist();
        if (document.getElementById('input-drawer').classList.contains('open')) toggleDrawer('input-drawer');
    };

    AudioEngine.prototype.playTrack = function(idx) {
        if (idx < 0 || idx >= state.playlist.length) return;
        var self = this;
        state.trackIdx = idx;
        var track = state.playlist[idx];
        this.stop(false);
        this.initContext();

        state.audioEl = new Audio(track.src);
        state.audioEl.crossOrigin = 'anonymous';
        state.audioEl.onended = function() { self.playNext(); };

        try {
            state.src = state.ctx.createMediaElementSource(state.audioEl);
            state.src.connect(state.analyser);
        } catch (e) {
            console.warn('Viz connect fail');
        }

        state.audioEl.play()
            .then(function() {
                self._bindEvents(state.audioEl);
                self.updateMeta(track.name, 'Track ' + (idx + 1) + ' / ' + state.playlist.length);
                self.startUI();
                self.renderPlaylist();
            })
            .catch(function() { showToast('播放失败'); });
    };

    AudioEngine.prototype.playNext = function() {
        if (state.strudelPlaying || state.playlist.length === 0) return;
        this.playTrack((state.trackIdx + 1) % state.playlist.length);
    };

    AudioEngine.prototype.playPrev = function() {
        if (state.strudelPlaying || state.playlist.length === 0) return;
        this.playTrack((state.trackIdx - 1 + state.playlist.length) % state.playlist.length);
    };

    AudioEngine.prototype.toggleMic = function() {
        var self = this;
        if (state.mic) { this.stop(); return; }
        this.stop();
        this.initContext();
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(function(stream) {
                state.micStream = stream;
                state.src = state.ctx.createMediaStreamSource(stream);
                state.src.connect(state.analyser);
                state.mic = true;
                self.updateMeta('Air Resonance', 'Listening...');
                ui.mic.classList.add('active');
                self.startUI();
            })
            .catch(function() { showToast('需要麦克风权限'); });
    };

    AudioEngine.prototype.togglePlay = function() {
        this.initContext();
        if (state.mic) { this.toggleMic(); return; }
        if (state.strudelPlaying) { stopStrudel(); return; }
        if (!state.audioEl) {
            if (state.playlist.length > 0) this.playTrack(state.trackIdx);
            else { toggleDrawer('input-drawer'); showToast('请添加音乐或运行Strudel代码'); }
            return;
        }
        if (state.playing) { state.audioEl.pause(); this.stopUI(); }
        else { state.audioEl.play(); this.startUI(); }
    };

    AudioEngine.prototype.stop = function(clear) {
        if (clear === undefined) clear = true;
        if (state.strudelPlaying) {
            try { if (typeof hush === 'function') hush(); } catch (e) { console.warn('Strudel stop error:', e); }
            state.strudelPlaying = false;
        }
        if (state.audioEl) { state.audioEl.pause(); state.audioEl = null; }
        if (state.src) { try { state.src.disconnect(); } catch (e) {} state.src = null; }
        if (state.micStream) {
            state.micStream.getTracks().forEach(function(t) { t.stop(); });
            state.micStream = null;
        }
        if (state.mic) { state.mic = false; ui.mic.classList.remove('active'); }
        if (clear) { this.stopUI(); viz.stop(); }
    };

    AudioEngine.prototype._bindEvents = function(el) {
        var self = this;
        el.ontimeupdate = function() {
            if (!state.playing || state.strudelPlaying) return;
            var pct = el.currentTime / el.duration || 0;
            ui.pFill.style.width = (pct * 100) + '%';
            ui.cTime.innerText = self.fmt(el.currentTime);
            ui.ringProgress.style.strokeDashoffset = 100 - (pct * 100);
        };
        el.onloadedmetadata = function() { ui.tTime.innerText = self.fmt(el.duration); };
    };

    AudioEngine.prototype.renderPlaylist = function() {
        if (state.playlist.length === 0) {
            ui.plView.innerHTML = '<div style="text-align:center; color:var(--text-sub); padding:10px;">列表为空</div>';
            return;
        }
        ui.plView.innerHTML = state.playlist.map(function(t, i) {
            return '<div class="pl-item ' + (i === state.trackIdx ? 'active' : '') + '" onclick="engine.playTrack(' + i + ')">' +
                '<i class="material-icons-round" style="font-size:16px;">' + (i === state.trackIdx ? 'equalizer' : 'music_note') + '</i>' +
                '<span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">' + t.name + '</span>' +
                '</div>';
        }).join('');
    };

    AudioEngine.prototype.updateMeta = function(t, a) {
        ui.title.innerText = t; ui.cText.innerText = t; ui.artist.innerText = a;
    };

    AudioEngine.prototype.startUI = function() {
        state.playing = true;
        ui.playBtns.forEach(function(b) { b.innerHTML = '<i class="material-icons-round">pause</i>'; });
        ui.card.classList.add('breathing');
        viz.start();
        resetZen();
    };

    AudioEngine.prototype.stopUI = function() {
        state.playing = false;
        ui.playBtns.forEach(function(b) { b.innerHTML = '<i class="material-icons-round">play_arrow</i>'; });
        ui.card.classList.remove('breathing');
        ui.shell.classList.remove('zen');
        ui.pFill.style.width = '0%';
        ui.cTime.innerText = '0:00';
        ui.tTime.innerText = '0:00';
        ui.ringProgress.style.strokeDashoffset = 100;
    };

    AudioEngine.prototype.fmt = function(s) {
        if (!s || isNaN(s)) return '0:00';
        var m = Math.floor(s / 60), sec = Math.floor(s % 60);
        return m + ':' + (sec < 10 ? '0' : '') + sec;
    };

    // ─── Strudel ───
    function runStrudel() {
        engine.stop(false);
        engine.initContext();
        var code = document.getElementById('strudel-code').value;
        try {
            showToast('正在生成音乐...');
            evaluate(code);
            state.strudelPlaying = true;
            engine.updateMeta('Strudel Live Code', 'Generative Music');
            engine.startUI();
            showToast('音乐生成中');
            document.getElementById('strudel-drawer').classList.remove('open');
        } catch (e) {
            showToast('Strudel错误: ' + e.message);
            console.error(e);
        }
    }

    function stopStrudel() {
        if (state.strudelPlaying) {
            try { if (typeof hush === 'function') hush(); } catch (e) { console.warn('Strudel stop error:', e); }
            state.strudelPlaying = false;
            engine.stopUI();
            showToast('已停止生成');
        }
    }

    // ─── Hydra manual code ───
    function runHydra() {
        var code = document.getElementById('hydra-code').value;
        try {
            new Function(code)();
            showToast('视觉效果已应用');
        } catch (e) {
            showToast('Hydra错误: ' + e.message);
            console.error(e);
        }
    }

    function resetHydra() {
        viz.applyStyle(state.mode);
        showToast('已重置为主题预设');
    }

    // ─── Smart theme ───
    function randomSmartTheme() {
        if (!state.playing) {
            var others = visualStyles.filter(function(t) { return t.id !== state.mode && t.performanceLevel <= state.devicePerformance; });
            var next = others[Math.floor(Math.random() * others.length)];
            viz.applyStyle(next.id);
        } else {
            var next = viz.getSmartStyle();
            viz.applyStyle(next.id);
        }
    }

    // ─── Zen mode ───
    function resetZen() {
        clearTimeout(state.zenTimer);
        if (ui.shell.classList.contains('zen')) return;
        if (state.playing) state.zenTimer = setTimeout(enterZenMode, 4000);
    }
    function enterZenMode() { ui.shell.classList.add('zen'); }

    // ─── Drawers ───
    function toggleDrawer(id) {
        var el = document.getElementById(id);
        var isOpen = el.classList.contains('open');
        document.querySelectorAll('.drawer').forEach(function(d) { d.classList.remove('open'); });
        if (!isOpen) el.classList.add('open');
    }

    // ─── Init & Bindings ───
    engine = new AudioEngine();

    // Touch swipe for zen mode
    document.addEventListener('touchstart', function(e) { state.touchStartX = e.touches[0].clientX; });
    document.addEventListener('touchend', function(e) {
        if (!ui.shell.classList.contains('zen')) return;
        var diff = e.changedTouches[0].clientX - state.touchStartX;
        if (Math.abs(diff) > 50) randomSmartTheme();
    });

    // Click to exit zen
    ui.shell.addEventListener('click', function() { ui.shell.classList.remove('zen'); resetZen(); });
    ui.card.addEventListener('click', function(e) { e.stopPropagation(); });
    document.getElementById('capsule').addEventListener('click', function(e) { e.stopPropagation(); });
    document.getElementById('capsule-play').addEventListener('click', function(e) { e.stopPropagation(); engine.togglePlay(); });

    window.addEventListener('resize', function() { viz.resize(); });
    ui.playBtns[0].onclick = function(e) { e.stopPropagation(); engine.togglePlay(); };
    ui.mic.onclick = function() { engine.toggleMic(); };
    document.getElementById('file-input').onchange = function(e) { engine.handleFiles(e.target.files); };
    document.getElementById('url-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') engine.playUrl(e.target.value.trim());
    });

    // Expose for inline onclick handlers
    window.engine = engine;
    window.viz = viz;
    window.toggleDrawer = toggleDrawer;
    window.randomSmartTheme = randomSmartTheme;
    window.runStrudel = runStrudel;
    window.stopStrudel = stopStrudel;
    window.runHydra = runHydra;
    window.resetHydra = resetHydra;
    window.enterZenMode = enterZenMode;
    </script>
</body>
</html>
