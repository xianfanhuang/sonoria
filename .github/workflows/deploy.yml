jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare artifact
        run: |

          mkdir publish
          # Use --no-preserve=links to ensure no hard links are preserved
          cp --no-preserve=links index.html publish/
          touch publish/.nojekyll

          [ -f hydra-synth.min.js ] && cp --no-preserve=links hydra-synth.min.js publish/
          [ -f strudel.js ] && cp --no-preserve=links strudel.js publish/

          if [ -d js ]; then
            # -L ensures symlinks are followed and copied as regular files
            cp -rL --no-preserve=links js publish/
          fi



          # Final safety check: remove any symlinks that might have been copied
          find publish -type l -delete

          echo "Artifact content size:"
          du -sh publish
          echo "Artifact file list:"
          ls -R publish

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:

          path: publish/


      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4