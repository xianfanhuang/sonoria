name: Deploy to GitHub Pages

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare artifact
        run: |
          mkdir publish
          cp --no-preserve=links index.html publish/
          touch publish/.nojekyll

          [ -f strudel.js ] && cp --no-preserve=links strudel.js publish/

          if [ -d js ]; then
            cp -rL --no-preserve=links js publish/
          fi

          # Safety cleanup: ensure no symlinks remain
          find publish -type l -delete

          echo "Artifact content size:"
          du -sh publish
          echo "Artifact file list:"
          ls -R publish

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
