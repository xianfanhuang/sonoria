name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare artifact
        run: |
          # 创建一个干净目录来存放要部署的文件
          mkdir publish
          cp index.html publish/
          cp .nojekyll publish/ 2>/dev/null || true
          # 复制所有根目录下的 .js 文件（不含子目录）
          find . -maxdepth 1 -name "*.js" -exec cp {} publish/ \;
          # 复制 js/ 目录，但排除 node_modules 和符号链接
          if [ -d js ]; then
            cp -rL js publish/   # -L 解引用符号链接，转为实体文件
          fi
          # 可选：添加 .md 文件（通常不需要）
          # find . -maxdepth 1 -name "*.md" -exec cp {} publish/ \;

          # 检查大小
          echo "Artifact size:"
          du -sh publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: publish/
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5